automation:
  name: "Automation Projects"
  tagline: "Connect your tools and eliminate manual work"
  description: "I build automation systems that connect your existing tools, reduce manual data entry, and keep everything in sync. This starts with a workflow review to identify what can be automated, followed by implementation."
  ideal_for:
    - "You're doing too much manual data entry"
    - "You know exactly what needs automating"
    - "You want to connect tools and eliminate repetitive work"
  whats_included:
    - "Workflow review and automation roadmap"
    - "Development of the automation"
    - "Testing with your actual data"
    - "Documentation of how it works"
    - "Support for any bugs after launch"
  timeline: "Typically 1-3 weeks"
  cta_text: "Discuss your automation"

product_build:
  name: "Product Development"
  tagline: "Build a web application with AI integration"
  description: "I develop web applications from scratch or add significant features to existing ones. Works best when requirements are clear and scope is defined."
  ideal_for:
    - "You have a clear product idea to build"
    - "You need a working version quickly"
    - "You want a Rails developer with AI experience"
  whats_included:
    - "Planning and feature scoping"
    - "Full-stack development (Rails, JS, etc.)"
    - "Deployment to production"
    - "Documentation and code handoff"
    - "Bug fixes after launch"
  timeline: "Depends on scope, typically weeks not months"
  cta_text: "Discuss your project"
